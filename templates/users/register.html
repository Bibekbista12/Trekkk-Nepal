{% extends 'base.html' %}
{% block title %}Register — TrekNepal{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
  <div class="bg-white rounded-2xl shadow-lg p-8">
    <h1 class="text-2xl font-bold mb-6 text-center">Create Account</h1>

    {% if messages %}
      {% for message in messages %}
        <div class="bg-red-100 text-red-700 px-4 py-2 rounded-lg mb-4 text-sm">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <label class="block text-sm font-medium mb-1">Username</label>
      <input type="text" name="username" required
        class="w-full border rounded-lg px-3 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-green-400">

      <label class="block text-sm font-medium mb-1">Email</label>
      <input type="email" name="email" required
        class="w-full border rounded-lg px-3 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-green-400">

      <label class="block text-sm font-medium mb-1">I am a</label>
      <select name="role" class="w-full border rounded-lg px-3 py-2 mb-4 focus:outline-none">
        <option value="tourist">Tourist</option>
        <option value="agency">Travel Agency</option>
      </select>

      <label class="block text-sm font-medium mb-1">Password</label>
      <input type="password" name="password1" required
        class="w-full border rounded-lg px-3 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-green-400">

      <label class="block text-sm font-medium mb-1">Confirm Password</label>
      <input type="password" name="password2" required
        class="w-full border rounded-lg px-3 py-2 mb-6 focus:outline-none focus:ring-2 focus:ring-green-400">

      <button type="submit"
        class="w-full bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700">
        Create Account
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-4">
      Already have an account?
      <a href="{% url 'login' %}" class="text-green-600 hover:underline">Login</a>
    </p>
  </div>
</div>
{% endblock %}
